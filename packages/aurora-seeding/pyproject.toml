[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "aurora-seeding"
version = "0.1.0"
description = "Physically consistent cloud seeding perturbations for the Aurora weather model"
requires-python = ">=3.10"
dependencies = [
    "torch",
    "numpy",
]
